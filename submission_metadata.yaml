# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Deterministic high-performance ranking pipeline operating locally on CPU with standard library 
  modules. Comprising: (1) validation of date format and schema, (2) JD relevance keywords using 
  regular expression with word boundaries (\b) to filter out false positives, (3) disqualifying 
  criteria for purely academic researchers, title seekers, and developers only using LangChain, 
  (4) anomaly check for timeline overlaps (soft penalty capped at -5.0 points for moonlighting/honeypots), 
  (5) penalties for platform inactivity and lack of responsiveness, and (6) 7-factor composite final 
  score (35% Core Fit, 20% Search, 15% Prod ML, 10% Behavioral, 10% Exp, 7% Skills, 3% Edu) with 
  shipper bonuses in the 0.0-1.0 scale. Dynamically constructs fact-based recruiter logic through 
  sentence variations to ensure no repetition. Handles 100K records in 191.74s with 0% honeypots.

