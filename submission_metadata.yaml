ai_usage_summary: |
  Used Gemini for pair programming, code design, and pipeline alignment. No candidate data was sent to hosted APIs; all candidate scoring runs locally on CPU.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  End-to-end local python pipeline utilizing a six-stage hybrid discovery framework. Employs: (1) schema and date data quality filters, (2) strict regex word-boundary keyword mapping to score JD-aligned experience relevance (search, ranking, recsys, production), (3) disqualifiers for LangChain-only wrappers and pure research roles, (4) timeline overlap anomaly detection (moonlighting penalized, severe rejected), (5) behavioral signal tracking for candidate platform availability, and (6) final composite scoring (35% core fit, 20% search/retrieval, 15% production, 10% experience, 10% behavioral, 7% skills, 3% education) with shipper-leaning adjustments. Runtime is ~3 minutes for 100K candidates on CPU with 0% honeypot rate in the top 100.

